<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#1e88e5">
  <title>자재 가격 프로그램</title>
  <link rel="stylesheet" href="styles.css?v=2.5.0">
</head>
<body>
  <header class="header"><h1>자재 가격 프로그램</h1><b>v2.5.0</b></header>
  <main>
    <section id="migration" class="notice hidden"><div><strong>기존 아이폰 자료를 가져왔습니다.</strong><p id="migrationText"></p></div><button id="migrationClose">×</button></section>

    <section class="stats">
      <article><span>등록 자재</span><strong id="materialCount">0</strong></article>
      <article><span>마지막 변경</span><strong id="lastUpdated">-</strong></article>
    </section>

    <section id="formCard" class="card">
      <div class="title"><h2>자재 관리</h2></div>
      <div class="material-search"><label>자재 명칭 검색 및 입력<input id="materialName" type="search" autocomplete="off" placeholder="자재명을 검색하거나 새로 입력"></label><div id="materialResults" class="material-results hidden"></div></div>
      <div class="unit-title"><h3>단위 및 가격</h3><button id="addUnitBtn" class="sub small">＋ 단위 추가</button></div>
      <div class="scroll"><table class="unit-table"><thead><tr><th>단위명</th><th>자재가격</th><th>운반비</th><th>총입고</th><th>판매(제외)</th><th>판매(포함)</th><th>삭제</th></tr></thead><tbody id="unitBody"></tbody></table></div>
      <div class="actions"><button id="resetBtn" class="sub">초기화</button><button id="saveBtn">자재 저장</button></div>
    </section>

    <section class="card">
      <div class="title list-title"><h2>보유 자재</h2><input id="search" type="search" placeholder="자재명 또는 단위 검색"></div>
      <div class="list-wrap"><table class="material-table"><thead><tr><th>자재명</th><th>단위</th><th>자재가</th><th>판매(제외)</th><th>판매(포함)</th><th>관리</th></tr></thead><tbody id="listBody"></tbody></table><div id="empty" class="empty hidden"><strong>등록된 자재가 없습니다.</strong></div></div>
    </section>

    <section class="card">
      <div class="title"><h2>데이터 관리</h2></div>
      <div class="toolbar">
        <button id="templateBtn" class="sub">빈 엑셀 양식</button>
        <button id="exportBtn">엑셀로 내보내기</button>
        <button id="importBtn" class="outline">엑셀 추가 불러오기</button>
        <button id="restoreBtn" class="sub">이전 목록 복구</button>
      </div>
      <input id="excelFile" type="file" accept=".xlsx,.xls" hidden>
    </section>
  </main>

  <div id="modal" class="modal hidden"><div class="backdrop" data-close></div><section class="modal-box" role="dialog" aria-modal="true"><div class="title"><h2>엑셀 추가 확인</h2><button class="x" data-close>×</button></div><p id="fileName" class="filename"></p><div class="preview"><div><span>신규 자재</span><b id="newMaterials">0</b></div><div><span>신규 단위</span><b id="newUnits">0</b></div><div><span>중복</span><b id="duplicates">0</b></div><div><span>오류</span><b id="errors">0</b></div></div><label class="check"><input id="updateDuplicates" type="checkbox">같은 자재명과 단위가 있으면 엑셀 가격으로 수정</label><div id="errorList" class="error-list hidden"></div><div class="actions"><button class="sub" data-close>취소</button><button id="confirmImport">추가 저장</button></div></section></div>
  <div id="toast" class="toast hidden"></div>
  <script src="xlsx.full.min.js"></script>
  <script src="app.js?v=2.5.0"></script>
</body>
</html>
